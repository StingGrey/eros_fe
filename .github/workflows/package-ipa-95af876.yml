name: Package IPA for 95af876

on:
  workflow_dispatch:
  push:
    branches:
      - ipa-95af876-20260602

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  package-ios:
    name: Package unsigned iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.x
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Pub get and codegen
        shell: bash
        run: |
          set -euxo pipefail
          git config --global core.longpaths true
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run intl_utils:generate

      - name: Build iOS app
        shell: bash
        run: |
          set -euxo pipefail
          sed -i '' 's/dev2.cn.honjow.fehv/cn.honjow.fehv/g' ios/Runner.xcodeproj/project.pbxproj
          rm -f ios/Podfile.lock
          cd ios
          for attempt in 1 2 3; do
            if pod update && pod install --repo-update; then
              break
            fi
            status=$?
            echo "CocoaPods failed with exit code $status on attempt $attempt"
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            sleep $((attempt * 20))
          done
          cd ..
          flutter build ios --release --no-codesign

      - name: Thin app
        shell: bash
        run: |
          set -euxo pipefail
          sh scripts/thin-payload.sh build/ios/iphoneos/*.app

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euxo pipefail
          app_version="$(head -n 5 pubspec.yaml | tail -n 1 | cut -d ' ' -f 2)"
          app_path="$(find build/ios/iphoneos -maxdepth 1 -type d -name '*.app' -print | head -n 1)"
          if [ -z "$app_path" ] || [ ! -d "$app_path" ]; then
            echo "No .app bundle found under build/ios/iphoneos"
            find build/ios -maxdepth 5 -type d -name '*.app' -print || true
            exit 1
          fi
          rm -rf artifacts
          mkdir -p artifacts/Payload
          cp -R "$app_path" artifacts/Payload/
          ipa="Eros-FE_95af876_${app_version}_unsigned.ipa"
          (cd artifacts && zip -9 "$ipa" -r Payload)
          ls -lh "artifacts/$ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ios-95af876
          path: artifacts/*.ipa
          if-no-files-found: error
          retention-days: 30
